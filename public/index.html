<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Process Education Assistant</title>
  <!-- Tailwind CSS via CDN for rapid prototyping -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom simple styling for the chat container */
    #chat-history {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }
    #chat-history::-webkit-scrollbar {
      width: 6px;
    }
    #chat-history::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

  <!-- Header -->
  <header class="bg-indigo-600 text-white p-6 shadow-md">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">Democracy Desk AI</h1>
        <p class="text-indigo-200 text-sm mt-1">Your guide to the upcoming elections.</p>
      </div>
      <!-- Remind Me Button Container (logic initialized in script) -->
      <div id="remind-me-container" class="hidden">
        <a id="remind-me-btn" target="_blank" href="#" class="bg-white text-indigo-600 px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-50 transition shadow">
          📅 Remind Me to Vote
        </a>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- Left Column: Chat Assistant (Takes up 2/3 width on md+) -->
    <section class="md:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden h-[600px]">
      <div class="bg-indigo-50 p-4 border-b border-indigo-100">
        <h2 class="font-semibold text-indigo-800 flex items-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
          Ask the Assistant
        </h2>
      </div>
      
      <!-- Context Toggles for testing -->
      <div class="bg-gray-50 p-3 border-b text-xs flex gap-4 text-gray-600 justify-center">
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="context-under18" class="rounded text-indigo-600 focus:ring-indigo-500">
          <span>I am under 18</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="context-experienced" class="rounded text-indigo-600 focus:ring-indigo-500">
          <span>Experienced Voter</span>
        </label>
      </div>

      <div id="chat-history" class="flex-grow p-4 overflow-y-auto flex flex-col gap-3">
        <div class="bg-indigo-100 text-indigo-900 p-3 rounded-lg rounded-tl-none max-w-[80%] self-start text-sm">
          Hello! I'm your Election Assistant. Ask me anything about how to vote, key dates, or finding your polling station!
        </div>
      </div>
      
      <div class="p-4 border-t bg-gray-50">
        <form id="chat-form" class="flex gap-2">
          <input type="text" id="chat-input" class="flex-grow px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="e.g., Where do I vote?" required autocomplete="off">
          <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Send
          </button>
        </form>
      </div>
    </section>

    <!-- Right Column: Maps & Info -->
    <section class="md:col-span-1 flex flex-col gap-6">
      
      <!-- Booth Locator -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-4 border-b border-gray-100">
          <h2 class="font-semibold text-gray-800 flex items-center">
            <svg class="w-5 h-5 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Booth Locator
          </h2>
          <p class="text-xs text-gray-500 mt-1">Placeholder for your polling station</p>
        </div>
        <div class="w-full h-48 bg-gray-200" id="map-container">
          <!-- Iframe injected via JS to use the API key securely -->
          <div class="w-full h-full flex items-center justify-center text-sm text-gray-500">Loading Map...</div>
        </div>
      </div>

    </section>
  </main>

  <script>
    // Elements
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatHistory = document.getElementById('chat-history');
    const under18Check = document.getElementById('context-under18');
    const experiencedCheck = document.getElementById('context-experienced');
    const remindMeContainer = document.getElementById('remind-me-container');
    const remindMeBtn = document.getElementById('remind-me-btn');
    const mapContainer = document.getElementById('map-container');

    // Load initial configurations and data
    async function init() {
      try {
        // 1. Fetch config (API keys for frontend if needed)
        const configRes = await fetch('/api/config');
        const config = await configRes.json();
        
        // 2. Fetch election data for the Calendar Link
        const dataRes = await fetch('/api/election-data');
        const electionData = await dataRes.json();
        setupCalendarButton(electionData);

        // 3. Setup Google Map Embed (using a placeholder address "New Delhi")
        setupMap(config.googleMapsApiKey);

      } catch (err) {
        console.error("Initialization error:", err);
      }
    }

    // Generate Google Calendar Link
    function setupCalendarButton(data) {
      if(data && data.dates && data.dates.polling) {
        const pollingDateStr = data.dates.polling.replace(/-/g, ''); // format: YYYYMMDD
        const title = encodeURIComponent(`${data.election} - Polling Day!`);
        const details = encodeURIComponent('Remember to go out and vote today!');
        
        // Google Calendar Add Event URL format
        const calUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${pollingDateStr}T020000Z/${pollingDateStr}T120000Z&details=${details}`;
        
        remindMeBtn.href = calUrl;
        remindMeContainer.classList.remove('hidden');
      }
    }

    // Setup Google Maps Embed
    function setupMap(apiKey) {
      // Using 'New Delhi' as a generic placeholder for the hackathon UI
      const query = encodeURIComponent("New Delhi, India");
      mapContainer.innerHTML = `<iframe 
        width="100%" 
        height="100%" 
        style="border:0" 
        loading="lazy" 
        allowfullscreen 
        src="https://www.google.com/maps/embed/v1/place?key=${apiKey}&q=${query}">
      </iframe>`;
    }

    // Helper to add messages to UI
    function appendMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = isUser 
        ? "bg-indigo-600 text-white p-3 rounded-lg rounded-tr-none max-w-[80%] self-end text-sm" 
        : "bg-indigo-100 text-indigo-900 p-3 rounded-lg rounded-tl-none max-w-[80%] self-start text-sm whitespace-pre-wrap";
      div.textContent = text;
      chatHistory.appendChild(div);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // Chat form submission
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = chatInput.value.trim();
      if (!message) return;

      appendMessage(message, true);
      chatInput.value = '';

      // Prepare context
      const userContext = {
        isUnder18: under18Check.checked,
        isExperienced: experiencedCheck.checked
      };

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: message, userContext })
        });
        
        const data = await res.json();
        if(data.reply) {
          appendMessage(data.reply, false);
        } else {
          appendMessage("Sorry, I didn't get a response.", false);
        }
      } catch (err) {
        appendMessage("Network error. Could not connect to assistant.", false);
      }
    });

    // Run initialization
    init();

  </script>
</body>
</html>
