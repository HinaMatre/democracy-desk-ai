<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Democracy Desk AI</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      /* Vibrant Royal Purple to Soft Lavender gradient */
      background: linear-gradient(135deg, #f3e8ff 0%, #e0e7ff 100%);
    }
    .glass {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* AI Bubble: soft grey/white */
    .chat-bubble-ai {
      background-color: #f8fafc;
      color: #334155;
      border-radius: 1.5rem 1.5rem 1.5rem 0.25rem;
      border: 1px solid #e2e8f0;
    }
    /* User Bubble: Royal Purple */
    .chat-bubble-user {
      background-color: #6b21a8; 
      color: white;
      border-radius: 1.5rem 1.5rem 0.25rem 1.5rem;
    }
  </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col md:flex-row text-slate-800">

  <!-- Desktop Sidebar / Mobile Bottom Nav -->
  <nav class="glass flex md:flex-col justify-around md:justify-start items-center md:items-stretch w-full md:w-80 h-20 md:h-full p-3 md:p-6 fixed bottom-0 md:relative z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] md:shadow-xl">
    
    <!-- Branding (Hidden on mobile nav) -->
    <div class="hidden md:block mb-8 text-center mt-4">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 to-indigo-600 text-white shadow-lg mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
      </div>
      <h1 class="text-2xl font-bold text-purple-900 leading-tight">Democracy<br>Desk AI</h1>
    </div>

    <!-- Election Countdown Card (Sunrise Orange) -->
    <div class="hidden md:flex flex-col bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-2xl p-5 mb-8 shadow-lg transform transition hover:-translate-y-1 animate-pulse">
      <h3 class="text-xs font-semibold uppercase tracking-widest opacity-90 mb-1">Polling Day</h3>
      <div id="countdown-date" class="text-2xl font-bold mb-1 tracking-tight">Loading...</div>
      <p class="text-sm font-medium opacity-90" id="countdown-timer">Calculating...</p>
    </div>

    <!-- Action Buttons -->
    <div class="flex md:flex-col gap-3 w-full md:w-auto px-2 md:px-0">
      <a id="nav-btn-booth" href="https://www.google.com/maps/search/polling+booth+near+me" target="_blank" aria-label="Find My Booth on Google Maps" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white hover:bg-slate-50 text-purple-800 font-semibold py-3 md:py-4 px-4 rounded-2xl shadow-sm hover:shadow-md hover:scale-105 transition-all duration-300 border border-purple-100">
        <span class="text-xl md:text-2xl" aria-hidden="true">📍</span> <span class="hidden md:inline">Find My Booth</span><span class="md:hidden text-xs font-bold">Booth</span>
      </a>

      <a id="nav-btn-remind" target="_blank" href="#" aria-label="Set Google Calendar Reminder" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600 to-purple-800 hover:from-purple-700 hover:to-purple-900 text-white font-semibold py-3 md:py-4 px-4 rounded-2xl shadow-md hover:shadow-lg hover:scale-105 transition-all duration-300">
        <span class="text-xl md:text-2xl" aria-hidden="true">📅</span> <span class="hidden md:inline">Set Reminder</span><span class="md:hidden text-xs font-bold">Remind</span>
      </a>
    </div>

    <!-- Context toggles (Desktop testing utility) -->
    <div class="hidden md:block mt-auto bg-white/40 rounded-2xl p-4 border border-white">
      <p class="text-[10px] font-bold text-purple-800 mb-2 uppercase tracking-wider">Context Settings</p>
      
      <div class="mb-3">
        <label for="country-selector" class="sr-only">Select Country</label>
        <select id="country-selector" class="w-full bg-white border border-slate-200 text-slate-700 text-sm rounded-xl focus:ring-purple-500 focus:border-purple-500 block p-2 outline-none shadow-sm transition-all hover:border-purple-300 cursor-pointer">
          <option value="India">India</option>
          <option value="USA">USA</option>
          <option value="Brazil">Brazil</option>
          <option value="Colombia">Colombia</option>
          <option value="Germany">Germany</option>
          <option value="Sweden">Sweden</option>
          <option value="Japan">Japan</option>
        </select>
      </div>

      <p class="text-[10px] font-bold text-purple-800 mb-2 uppercase tracking-wider border-t border-white/50 pt-3">Voter Type</p>
      <label class="flex items-center gap-2 cursor-pointer text-sm mb-2 text-slate-700 font-medium">
        <input type="radio" name="voter-type" id="context-default" class="border-slate-300 text-purple-600 focus:ring-purple-500 w-4 h-4" checked>
        <span>Newcomer (Default)</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer text-sm mb-2 text-slate-700 font-medium">
        <input type="radio" name="voter-type" id="context-under18" class="border-slate-300 text-purple-600 focus:ring-purple-500 w-4 h-4">
        <span>Under 18</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-700 font-medium">
        <input type="radio" name="voter-type" id="context-experienced" class="border-slate-300 text-purple-600 focus:ring-purple-500 w-4 h-4">
        <span>Experienced Voter</span>
      </label>
    </div>

  </nav>

  <!-- Main Chat Window -->
  <main class="flex-grow flex flex-col h-screen relative max-w-5xl mx-auto w-full p-0 pb-24 md:p-6 md:pb-6">
    
    <!-- Mobile Header -->
    <div class="md:hidden glass p-3 flex justify-between items-center z-10 border-b border-white/30 rounded-b-2xl shadow-sm">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-600 to-indigo-600 text-white flex items-center justify-center shadow-md shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
        </div>
        <div>
          <h1 class="text-sm font-bold text-purple-900 leading-tight">Democracy Desk</h1>
          <div id="mobile-countdown" class="text-[9px] font-bold uppercase tracking-wider text-orange-600 mt-0.5">Polling...</div>
        </div>
      </div>
      
      <!-- Mobile Country Selector -->
      <select id="mobile-country-selector" class="bg-white/80 border border-purple-200 text-purple-900 text-[10px] sm:text-xs rounded-lg focus:ring-purple-500 focus:border-purple-500 block p-1.5 outline-none shadow-sm cursor-pointer font-medium max-w-[90px] sm:max-w-[120px]">
        <option value="India">🇮🇳 India</option>
        <option value="USA">🇺🇸 USA</option>
        <option value="Brazil">🇧🇷 Brazil</option>
        <option value="Colombia">🇨🇴 Colombia</option>
        <option value="Germany">🇩🇪 Germany</option>
        <option value="Sweden">🇸🇪 Sweden</option>
        <option value="Japan">🇯🇵 Japan</option>
      </select>
    </div>

    <!-- Chat Area -->
    <div class="flex-grow bg-white/70 backdrop-blur-xl md:rounded-3xl shadow-2xl border border-white/60 flex flex-col overflow-hidden md:m-0 mt-4 mx-4 rounded-3xl z-10 h-full">
      
      <!-- Messages Container -->
      <div id="chat-history" class="flex-1 p-4 md:p-8 overflow-y-auto scrollbar-hide flex flex-col gap-6">
        <!-- Initial message -->
        <div class="chat-bubble-ai p-4 shadow-sm self-start max-w-[90%] md:max-w-[75%] min-h-[6rem]">
          <p class="text-sm md:text-base leading-relaxed font-medium"><span id="welcome-msg"></span></p>
        </div>
      </div>

      <!-- Suggested Questions -->
      <div class="px-3 md:px-5 pb-2 flex flex-wrap gap-2 justify-center">
        <button type="button" class="suggested-btn px-4 py-1.5 rounded-full border-2 border-purple-600 text-orange-600 font-medium text-xs md:text-sm hover:bg-purple-50 focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:outline-none transition-colors shadow-sm">How do I register?</button>
        <button type="button" class="suggested-btn px-4 py-1.5 rounded-full border-2 border-purple-600 text-orange-600 font-medium text-xs md:text-sm hover:bg-purple-50 focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:outline-none transition-colors shadow-sm">What documents do I need?</button>
        <button type="button" class="suggested-btn px-4 py-1.5 rounded-full border-2 border-purple-600 text-orange-600 font-medium text-xs md:text-sm hover:bg-purple-50 focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:outline-none transition-colors shadow-sm">Who are the candidates?</button>
      </div>

      <!-- Input Area -->
      <div class="p-3 md:p-5 bg-white border-t border-slate-100">
        <form id="chat-form" class="flex items-center gap-3 w-full relative">
          <input type="text" id="chat-input" aria-label="Type your question here" class="w-full bg-slate-100 border border-slate-200 rounded-full py-3 md:py-4 pl-6 pr-24 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm md:text-base text-slate-800 placeholder-slate-400 shadow-inner transition" placeholder="Type your question..." autocomplete="off" required>
          
          <button type="button" id="voice-btn" aria-label="Voice input" class="absolute right-[3.5rem] md:right-16 bg-slate-200 hover:bg-slate-300 text-purple-700 rounded-full p-2 md:p-2.5 transition-colors focus:outline-none focus:ring-2 focus:ring-purple-500 hidden items-center justify-center">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
          </button>

          <button type="submit" aria-label="Send message" class="absolute right-2 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white rounded-full p-2 md:p-2.5 shadow-md hover:shadow-lg transition-transform hover:scale-110 duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          </button>
        </form>
      </div>

    </div>

  </main>

  <script>
    // Elements
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatHistory = document.getElementById('chat-history');
    const under18Check = document.getElementById('context-under18');
    const experiencedCheck = document.getElementById('context-experienced');
    const navBtnRemind = document.getElementById('nav-btn-remind');
    const countdownDate = document.getElementById('countdown-date');
    const countdownTimer = document.getElementById('countdown-timer');
    const mobileCountdown = document.getElementById('mobile-countdown');
    const suggestedBtns = document.querySelectorAll('.suggested-btn');
    const countrySelector = document.getElementById('country-selector');
    const mobileCountrySelector = document.getElementById('mobile-country-selector');
    const voiceBtn = document.getElementById('voice-btn');

    // Sync country selectors
    if (mobileCountrySelector && countrySelector) {
      mobileCountrySelector.addEventListener('change', (e) => {
        countrySelector.value = e.target.value;
      });
      countrySelector.addEventListener('change', (e) => {
        mobileCountrySelector.value = e.target.value;
      });
    }

    let isTyping = false;

    // Initialization
    async function init() {
      // Start typing effect immediately for perceived performance
      new Typed('#welcome-msg', {
        strings: ["Welcome to <strong class='text-purple-800'>Democracy Desk AI</strong>! 🇮🇳 <br><br>I'm here to guide you through the upcoming elections. Ask me how to register, what documents to bring, or simply to find your polling station!"],
        typeSpeed: 15,
        showCursor: false
      });

      try {
        const configRes = await fetch('/api/config');
        const config = await configRes.json();
        
        const dataRes = await fetch('/api/election-data');
        const electionData = await dataRes.json();
        
        setupCalendarAndCountdown(electionData);

      } catch (err) {
        // Silently fail if optional data doesn't load, but let the user know basic functions work
        appendMessage("Welcome! I'm operating in basic mode right now, but I can still answer your questions.", false);
      }
    }

    function setupCalendarAndCountdown(data) {
      if(data && data.dates && data.dates.polling) {
        const pollingStr = data.dates.polling;
        
        // Update UI Text
        const dateObj = new Date(pollingStr);
        countdownDate.textContent = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        mobileCountdown.textContent = `Polling: ${countdownDate.textContent}`;
        
        // Countdown logic
        const updateTimer = () => {
          const now = new Date().getTime();
          const targetDate = dateObj.getTime();
          const distance = targetDate - now;
          if (distance < 0) {
            countdownTimer.textContent = "Election Day is Here!";
            return;
          }
          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          countdownTimer.textContent = `${days} days remaining`;
        };
        updateTimer();
        setInterval(updateTimer, 86400000);

        // Calendar Link
        const dateStr = pollingStr.replace(/-/g, '');
        const title = encodeURIComponent(`${data.election} - Polling Day!`);
        const details = encodeURIComponent('Democracy Desk Reminder: Remember to go vote today! Bring your Voter ID.');
        const calUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}T020000Z/${dateStr}T120000Z&details=${details}`;
        
        navBtnRemind.href = calUrl;
        
        // Add Confetti logic to reminder button
        navBtnRemind.addEventListener('click', () => {
          confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 },
            colors: ['#6b21a8', '#f97316', '#ffffff']
          });
        });
      }
    }

    // Suggested Button Handlers
    suggestedBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        chatInput.value = btn.textContent;
        // Optionally auto-submit
        // chatForm.dispatchEvent(new Event('submit'));
      });
    });

    // Chat UI Handlers
    function appendMessage(text, isUser) {
      const wrapper = document.createElement('div');
      wrapper.className = `p-4 md:p-5 shadow-sm max-w-[90%] md:max-w-[75%] text-sm md:text-base leading-relaxed font-medium ${
        isUser 
          ? "chat-bubble-user self-end ml-auto" 
          : "chat-bubble-ai self-start"
      }`;
      
      // Basic formatting
      const formattedText = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
        
      wrapper.innerHTML = formattedText;
      
      // Smooth animation
      wrapper.style.opacity = '0';
      wrapper.style.transform = 'translateY(15px)';
      wrapper.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      
      chatHistory.appendChild(wrapper);
      
      requestAnimationFrame(() => {
        wrapper.style.opacity = '1';
        wrapper.style.transform = 'translateY(0)';
      });
      
      setTimeout(() => {
        chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' });
      }, 50);
      
      return wrapper;
    }

    function showTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.id = 'typing-indicator';
      indicator.className = 'chat-bubble-ai p-4 self-start max-w-[80%] flex gap-2 items-center shadow-sm';
      indicator.innerHTML = `
        <div class="w-2.5 h-2.5 bg-slate-400 rounded-full animate-bounce"></div>
        <div class="w-2.5 h-2.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
        <div class="w-2.5 h-2.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
      `;
      chatHistory.appendChild(indicator);
      chatHistory.scrollTo({ top: chatHistory.scrollHeight, behavior: 'smooth' });
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById('typing-indicator');
      if(indicator) indicator.remove();
    }

    // Submit handler
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if(isTyping) return;
      
      const message = chatInput.value.trim();
      if (!message) return;

      appendMessage(message, true);
      chatInput.value = '';
      
      isTyping = true;
      showTypingIndicator();

      const userContext = {
        isUnder18: under18Check ? under18Check.checked : false,
        isExperienced: experiencedCheck ? experiencedCheck.checked : false,
        selectedCountry: countrySelector ? countrySelector.value : 'India'
      };

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: message, userContext })
        });
        
        const data = await res.json();
        hideTypingIndicator();
        
        if(data.reply) {
          appendMessage(data.reply, false);
        } else {
          appendMessage("Sorry, I didn't get a response.", false);
        }
      } catch (err) {
        hideTypingIndicator();
        appendMessage("Network error. Could not connect to the server.", false);
      } finally {
        isTyping = false;
      }
    });

    // Voice Input Logic
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition && voiceBtn) {
      voiceBtn.classList.remove('hidden');
      voiceBtn.classList.add('flex');
      
      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      
      let isRecording = false;

      voiceBtn.addEventListener('click', () => {
        if (isRecording) {
          recognition.stop();
        } else {
          try { recognition.start(); } catch(e) {}
        }
      });

      recognition.onstart = () => {
        isRecording = true;
        voiceBtn.classList.add('animate-pulse', 'bg-red-100', 'text-red-600');
        voiceBtn.classList.remove('bg-slate-200', 'text-purple-700', 'hover:bg-slate-300');
        chatInput.placeholder = "Listening...";
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        chatInput.value = transcript;
      };

      recognition.onend = () => {
        isRecording = false;
        voiceBtn.classList.remove('animate-pulse', 'bg-red-100', 'text-red-600');
        voiceBtn.classList.add('bg-slate-200', 'text-purple-700', 'hover:bg-slate-300');
        chatInput.placeholder = "Type your question...";
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error", event.error);
        if(event.error === 'not-allowed') {
            alert('Microphone access is blocked. Please allow microphone permissions in your browser.');
        }
        isRecording = false;
        voiceBtn.classList.remove('animate-pulse', 'bg-red-100', 'text-red-600');
        voiceBtn.classList.add('bg-slate-200', 'text-purple-700', 'hover:bg-slate-300');
        chatInput.placeholder = "Type your question...";
      };
    }

    init();
  </script>
</body>
</html>
